<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <title>BEAM Campus — Concept 1: Campus Square</title>
  <desc>A red square containing a geometric white letter B, fitted to a grid. Evokes architectural blocks and bauhaus typography.</desc>

  <!-- Red square -->
  <rect x="28" y="28" width="200" height="200" fill="#D41920"/>

  <!-- Thin black outline -->
  <rect x="28" y="28" width="200" height="200" fill="none" stroke="#000000" stroke-width="2"/>

  <!-- Geometric white B (pure rectangles, blocky letterform) -->
  <!-- Spine -->
  <rect x="76" y="68" width="24" height="120" fill="#FFFFFF"/>
  <!-- Top bar -->
  <rect x="100" y="68" width="80" height="20" fill="#FFFFFF"/>
  <!-- Top-right stem -->
  <rect x="160" y="88" width="20" height="30" fill="#FFFFFF"/>
  <!-- Middle bar -->
  <rect x="100" y="118" width="80" height="20" fill="#FFFFFF"/>
  <!-- Bottom-right stem -->
  <rect x="160" y="138" width="20" height="30" fill="#FFFFFF"/>
  <!-- Bottom bar -->
  <rect x="100" y="168" width="80" height="20" fill="#FFFFFF"/>
</svg>
